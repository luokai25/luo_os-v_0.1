<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LuoOS — by Luo Kai</title>
<style>
/* ═══ RESET ═════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  /* Dark theme (default) */
  --bg-deep:#020408;--bg-desktop:#060c14;--bg-panel:#0a1220;--bg-glass:rgba(10,18,32,.92);
  --bg-card:#0d1a2a;--bg-input:#0a1628;--bg-hover:rgba(0,200,255,.06);
  --border:#1a2d45;--border-bright:#00c8ff33;
  --accent:#00c8ff;--accent2:#7c3aed;--accent3:#00ff9d;--accent-red:#ff4d6d;
  --text:#e2f0ff;--text2:#8fa8c8;--text3:#3a5272;
  --font-main:"JetBrains Mono",ui-monospace,monospace;
  --font-ui:system-ui,-apple-system,sans-serif;
  --taskbar-h:52px;--sidebar-w:64px;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --glow:0 0 20px rgba(0,200,255,.25);
  --radius:14px;--radius-sm:8px;
}
.theme-light{
  --bg-deep:#f0f4f8;--bg-desktop:#e8eef5;--bg-panel:#ffffff;--bg-glass:rgba(255,255,255,.95);
  --bg-card:#f5f8fc;--bg-input:#edf2f7;--bg-hover:rgba(0,100,200,.06);
  --border:#d0dce8;--border-bright:#0088cc44;
  --accent:#0066cc;--accent3:#00aa66;--text:#1a2840;--text2:#4a6080;--text3:#90a8c0;
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text);font-family:var(--font-ui);font-size:14px}

/* ═══ WALLPAPER ════════════════════════════════════════════════════ */
#wallpaper{
  position:fixed;inset:0;z-index:0;
  background:var(--bg-desktop);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#wallpaper-text{
  font-size:min(22vw,300px);font-weight:900;letter-spacing:-0.04em;
  color:transparent;
  background:linear-gradient(135deg,#00c8ff08 0%,#7c3aed10 50%,#00ff9d06 100%);
  -webkit-background-clip:text;background-clip:text;
  user-select:none;pointer-events:none;
  text-shadow:none;
  filter:drop-shadow(0 0 80px #00c8ff15);
  font-family:var(--font-ui);
}

/* Window-like shadows around "LUO" text */
#wallpaper::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,200,255,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 70%, rgba(124,58,237,.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 50% 10%, rgba(0,255,157,.03) 0%, transparent 50%),
    radial-gradient(ellipse 30% 50% at 10% 80%, rgba(0,200,255,.03) 0%, transparent 50%),
    radial-gradient(ellipse 45% 35% at 90% 20%, rgba(124,58,237,.04) 0%, transparent 50%);
  pointer-events:none;
}

/* ═══ DESKTOP ICONS ════════════════════════════════════════════════ */
#desktop{
  position:fixed;
  top:0;left:var(--sidebar-w);
  width:calc(100% - var(--sidebar-w));
  height:calc(100% - var(--taskbar-h));
  display:flex;flex-wrap:wrap;align-content:flex-start;
  padding:20px;gap:8px;
  z-index:1;pointer-events:none;
}
.desk-icon{
  width:84px;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 6px;border-radius:var(--radius-sm);cursor:pointer;
  transition:all .2s;pointer-events:auto;
  user-select:none;
}
.desk-icon:hover{background:var(--bg-hover);transform:translateY(-2px)}
.desk-icon:active{transform:scale(.95)}
.desk-icon svg{width:52px;height:52px;border-radius:14px;flex-shrink:0}
.desk-icon span{font-size:11px;color:var(--text);text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,.8);line-height:1.3;
  word-break:break-word;max-width:80px}

/* ═══ SIDEBAR ══════════════════════════════════════════════════════ */
#sidebar{
  position:fixed;left:0;top:0;bottom:var(--taskbar-h);
  width:var(--sidebar-w);z-index:100;
  background:var(--bg-glass);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;gap:4px;backdrop-filter:blur(20px);
}
.sb-btn{
  width:44px;height:44px;border-radius:12px;border:none;background:none;
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .2s;position:relative;
}
.sb-btn:hover,.sb-btn.active{background:var(--bg-hover);color:var(--accent);
  box-shadow:0 0 12px rgba(0,200,255,.2)}
.sb-sep{width:32px;height:1px;background:var(--border);margin:4px 0}
.sb-tooltip{
  position:absolute;left:54px;background:var(--bg-card);border:1px solid var(--border);
  padding:4px 10px;border-radius:6px;font-size:11px;color:var(--text);
  white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;
}
.sb-btn:hover .sb-tooltip{opacity:1}
#sb-luokai-status{
  width:10px;height:10px;border-radius:50%;background:#555;
  position:absolute;bottom:8px;right:8px;border:2px solid var(--bg-panel);
}
#sb-luokai-status.on{background:var(--accent3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ═══ TASKBAR ══════════════════════════════════════════════════════ */
#taskbar{
  position:fixed;bottom:0;left:0;width:100%;height:var(--taskbar-h);
  background:var(--bg-glass);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  z-index:200;backdrop-filter:blur(20px);
}
#tb-start{
  padding:0 16px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:linear-gradient(135deg,var(--accent)22,var(--accent2)11);
  color:var(--accent);cursor:pointer;font-weight:700;font-family:var(--font-main);
  font-size:13px;letter-spacing:2px;transition:all .2s;
}
#tb-start:hover{background:linear-gradient(135deg,var(--accent)33,var(--accent2)22);
  box-shadow:var(--glow)}
#tb-apps{display:flex;gap:4px;flex:1;overflow:hidden}
.tb-app{
  padding:0 12px;height:36px;border-radius:8px;border:1px solid var(--border2,var(--border));
  background:var(--bg-card);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;gap:6px;font-size:12px;white-space:nowrap;
  transition:all .2s;
}
.tb-app.active{border-color:var(--accent)44;color:var(--text);
  background:linear-gradient(135deg,var(--accent)11,transparent)}
.tb-app:hover{background:var(--bg-hover)}
#tb-right{display:flex;align-items:center;gap:10px;margin-left:auto}
#tb-clock{font-family:var(--font-main);font-size:13px;color:var(--text2);
  text-align:right;line-height:1.3}
#tb-clock small{display:block;font-size:10px;color:var(--text3)}

/* ═══ WINDOW SYSTEM ════════════════════════════════════════════════ */
#window-container{
  position:fixed;left:var(--sidebar-w);top:0;
  width:calc(100% - var(--sidebar-w));height:calc(100% - var(--taskbar-h));
  z-index:50;pointer-events:none;
}
.window{
  position:absolute;background:var(--bg-glass);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  display:flex;flex-direction:column;overflow:hidden;
  backdrop-filter:blur(20px);pointer-events:auto;
  min-width:320px;min-height:240px;
  animation:winOpen .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes winOpen{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:none}}
.window.minimized{display:none}
.window.maximized{top:0!important;left:0!important;width:100%!important;height:100%!important;border-radius:0!important}
.window-header{
  display:flex;align-items:center;padding:0 12px;height:40px;
  background:var(--bg-card);border-bottom:1px solid var(--border);
  cursor:move;user-select:none;gap:8px;flex-shrink:0;
}
.window-btns{display:flex;gap:6px;flex-shrink:0}
.wbtn{width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;transition:filter .15s}
.wbtn.close{background:#ff5f57}.wbtn.min{background:#febc2e}.wbtn.max{background:#28c840}
.wbtn:hover{filter:brightness(1.2)}
.window-title{flex:1;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}
.window-title svg{width:16px;height:16px}
.window-content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ═══ APP: LUOKAI ASSISTANT ════════════════════════════════════════ */
.luokai-window .window-content{padding:0}
.luokai-chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{display:flex;gap:10px;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chat-msg.ai .chat-avatar{background:rgba(0,200,255,.12);color:var(--accent)}
.chat-msg.user .chat-avatar{background:rgba(124,58,237,.12);color:var(--accent2)}
.chat-bubble{max-width:78%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.chat-msg.ai .chat-bubble{background:var(--bg-card);border:1px solid var(--border);color:var(--text)}
.chat-msg.user .chat-bubble{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.2);color:var(--text)}
.luokai-input-row{
  display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);
  background:var(--bg-card);
}
.luokai-input{
  flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;color:var(--text);font-family:var(--font-main);font-size:13px;
  resize:none;height:40px;outline:none;transition:border .2s;
}
.luokai-input:focus{border-color:var(--accent)66}
.luokai-send{
  width:40px;height:40px;border-radius:10px;border:none;
  background:var(--accent);color:#000;cursor:pointer;font-size:18px;
  transition:all .2s;
}
.luokai-send:hover{transform:scale(1.05);box-shadow:0 0 12px rgba(0,200,255,.4)}
.luokai-voice-btn{
  width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
  background:none;color:var(--text2);cursor:pointer;font-size:18px;transition:all .2s;
}
.luokai-voice-btn.active{border-color:var(--accent3);color:var(--accent3);
  background:rgba(0,255,157,.1);animation:pulse 1.5s infinite}

/* ═══ APP: TERMINAL ════════════════════════════════════════════════ */
.term-body{
  flex:1;background:#010a04;padding:16px;overflow-y:auto;
  font-family:var(--font-main);font-size:13px;color:#00ff9d;line-height:1.7;
}
.term-output{white-space:pre-wrap;word-break:break-all}
.term-input-row{display:flex;align-items:center;padding:8px 16px;
  background:#010a04;border-top:1px solid #002a12;gap:8px}
.term-prompt{color:#00ff9d;font-family:var(--font-main);font-size:13px;white-space:nowrap}
.term-input{
  flex:1;background:none;border:none;color:#00ff9d;font-family:var(--font-main);
  font-size:13px;outline:none;caret-color:#00ff9d;
}
.term-error{color:#ff4d6d}.term-info{color:#00c8ff}.term-warn{color:#ffaa00}

/* ═══ APP: FILE MANAGER ════════════════════════════════════════════ */
.files-toolbar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid var(--border);background:var(--bg-card);
}
.files-path{
  flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--text2);font-size:12px;font-family:var(--font-main);
}
.files-grid{
  flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:12px;
  overflow-y:auto;align-content:flex-start;
}
.file-item{
  width:80px;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border-radius:8px;cursor:pointer;transition:all .15s;
}
.file-item:hover{background:var(--bg-hover)}
.file-item-icon{font-size:32px}
.file-item-name{font-size:10px;color:var(--text2);text-align:center;
  word-break:break-word;max-width:76px;line-height:1.3}

/* ═══ APP: BROWSER ═════════════════════════════════════════════════ */
.browser-bar{
  display:flex;align-items:center;gap:6px;padding:8px 12px;
  background:var(--bg-card);border-bottom:1px solid var(--border);
}
.browser-url{
  flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;
  padding:6px 12px;color:var(--text);font-size:13px;outline:none;
}
.browser-url:focus{border-color:var(--accent)66}
.browser-content{flex:1;background:#fff;border:none;width:100%;height:100%}
.browser-nav-btn{
  width:30px;height:30px;border-radius:6px;border:none;background:var(--bg-hover);
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.browser-nav-btn:hover{background:var(--bg-card);color:var(--text)}

/* ═══ APP: CODE EDITOR ═════════════════════════════════════════════ */
.code-toolbar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg-card);border-bottom:1px solid var(--border);
}
.code-lang-sel{
  background:var(--bg-input);border:1px solid var(--border);border-radius:6px;
  padding:4px 8px;color:var(--text);font-size:12px;
}
.code-run-btn{
  padding:5px 16px;border-radius:6px;border:none;background:var(--accent3);
  color:#000;cursor:pointer;font-size:12px;font-weight:700;
}
.code-editor{
  flex:1;padding:16px;background:#010a04;color:#00ff9d;
  font-family:var(--font-main);font-size:13px;border:none;resize:none;
  outline:none;line-height:1.7;
}
.code-output-panel{
  height:120px;background:#020c08;border-top:1px solid #001a08;
  padding:10px 16px;font-family:var(--font-main);font-size:12px;
  color:#00cc66;overflow-y:auto;white-space:pre-wrap;
}

/* ═══ APP: VS CODE ══════════════════════════════════════════════════ */
.vscode-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;background:var(--bg-deep)}
.vscode-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:#1e1e2e;border-bottom:1px solid #2a2a3e;
  flex-shrink:0;gap:8px;
}
.vscode-tb-btn{
  padding:4px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text2);cursor:pointer;font-size:11px;
  transition:all .15s;display:inline-flex;align-items:center;gap:4px;
}
.vscode-tb-btn:hover{background:var(--bg-hover);color:var(--text)}
.vscode-tb-btn.danger{border-color:#ff4d6d44;color:#ff4d6d}
.vscode-tb-btn.danger:hover{background:#ff4d6d18}
.vscode-panel{flex:1;display:flex;overflow:hidden}
.vscode-iframe{width:100%;height:100%;border:none;background:#1e1e1e}
.vscode-splash{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;background:var(--bg-desktop);
}
.vscode-spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:#0065a9;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.vscode-install-btn{
  padding:12px 32px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#0065a9,#0078d4);
  color:#fff;cursor:pointer;font-size:14px;font-weight:700;
  transition:all .2s;box-shadow:0 4px 16px rgba(0,101,169,.4);
}
.vscode-install-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,101,169,.5)}
.vscode-install-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.vscode-install-log{
  margin-top:16px;padding:12px 16px;background:#0a0a0a;border-radius:8px;
  font-family:var(--font-main);font-size:11px;color:#00ff9d;
  text-align:left;width:100%;max-width:420px;max-height:140px;
  overflow-y:auto;white-space:pre-wrap;border:1px solid #1a2a1a;
}

/* ═══ APP: SETTINGS ════════════════════════════════════════════════ */
.settings-layout{display:flex;flex:1;overflow:hidden}
.settings-sidebar{
  width:180px;border-right:1px solid var(--border);padding:8px;
  background:var(--bg-card);overflow-y:auto;flex-shrink:0;
}
.settings-item{
  padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;
  color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:8px;
}
.settings-item:hover,.settings-item.active{background:var(--bg-hover);color:var(--accent)}
.settings-content{flex:1;padding:20px;overflow-y:auto}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:12px;color:var(--text3);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px}
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.settings-row label{font-size:13px;color:var(--text2)}
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border);
  border:none;cursor:pointer;position:relative;transition:background .2s;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;width:18px;height:18px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .2s;
}
.toggle.on::after{transform:translateX(20px)}

/* ═══ APP: ABOUT ════════════════════════════════════════════════════ */
.about-content{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center;gap:16px;
}
.about-logo{font-size:72px;font-weight:900;color:var(--accent);letter-spacing:-2px;
  text-shadow:0 0 40px rgba(0,200,255,.3);font-family:var(--font-main)}
.about-name{font-size:24px;font-weight:700;color:var(--text)}
.about-tagline{font-size:14px;color:var(--text2);line-height:1.6;max-width:440px}
.about-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--bg-card);border:1px solid var(--border);color:var(--text2)}
.about-credits{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.8}

/* ═══ NOTIFICATIONS ════════════════════════════════════════════════ */
#notif-container{
  position:fixed;top:16px;right:16px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.notif{
  background:var(--bg-glass);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;max-width:300px;backdrop-filter:blur(20px);
  font-size:13px;animation:notifIn .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:auto;cursor:pointer;
}
@keyframes notifIn{from{opacity:0;transform:translateX(60px)}}
.notif-title{font-weight:600;color:var(--text);margin-bottom:4px;font-size:12px}
.notif-body{color:var(--text2);font-size:12px;line-height:1.4}
.notif.success{border-left:3px solid var(--accent3)}
.notif.error{border-left:3px solid var(--accent-red)}
.notif.info{border-left:3px solid var(--accent)}
.notif.warning{border-left:3px solid #ffaa00}

/* ═══ BOOT SCREEN ══════════════════════════════════════════════════ */
#boot-screen{
  position:fixed;inset:0;background:#020408;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#boot-logo{font-size:min(20vw,220px);font-weight:900;color:var(--accent);
  letter-spacing:-4px;text-shadow:0 0 80px rgba(0,200,255,.4);font-family:var(--font-main)}
#boot-subtitle{font-size:16px;color:var(--text2);letter-spacing:3px;text-transform:uppercase}
#boot-bar-container{width:280px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
#boot-bar{height:100%;background:var(--accent);width:0;border-radius:2px;transition:width .3s}
#boot-status{font-size:12px;color:var(--text3);font-family:var(--font-main);letter-spacing:1px}

/* ═══ SCROLL ════════════════════════════════════════════════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ VIRTUAL WORKSPACES (4-sided cube) ════════════════════════════
   Normal LuoOS desktop, 4 workspaces.
   Ctrl+→/← or Ctrl+1-4 to switch. Cube animates between them.
   Each workspace is a full clone of the desktop shell.
   Windows live on their workspace — not shared.
══════════════════════════════════════════════════════════════════ */

#workspace-root {
  position: fixed; inset: 0; z-index: 0;
  perspective: 2000px;
  perspective-origin: 50% 50%;
}

#workspace-cube {
  position: absolute; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.77,0,.175,1);
}

.workspace {
  position: absolute; width: 100%; height: 100%;
  transform-style: preserve-3d;
  backface-visibility: hidden;
  /* Each face positioned by JS */
}

/* Workspace indicator — bottom centre strip */
#ws-indicator {
  position: fixed; bottom: calc(var(--taskbar-h) + 8px); left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 8px; align-items: center;
  background: rgba(6,12,20,.85);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  z-index: 9999; pointer-events: auto;
  opacity: 0; transition: opacity .3s;
}
#ws-indicator.show { opacity: 1; }
.ws-dot {
  width: 26px; height: 6px; border-radius: 3px;
  background: var(--border); cursor: pointer;
  transition: background .2s, width .2s;
}
.ws-dot.active { background: var(--accent); width: 32px; }
#ws-label {
  font-size: 10px; color: var(--text2);
  font-family: var(--font-main); margin-left: 4px;
}

/* Thumbnail strip for Mission Control */
#mission-control {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(2,4,8,.92);
  backdrop-filter: blur(40px);
  display: none; align-items: center; justify-content: center; gap: 24px;
  flex-direction: column;
}
#mission-control.open { display: flex; }
#mc-title { color: var(--text2); font-size: 12px; font-family: var(--font-main); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 8px; }
#mc-workspaces { display: flex; gap: 20px; }
.mc-thumb {
  width: 260px; height: 165px;
  background: var(--bg-panel);
  border: 2px solid var(--border);
  border-radius: 12px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: border-color .2s, transform .2s;
  flex-shrink: 0;
}
.mc-thumb:hover, .mc-thumb.active { border-color: var(--accent); transform: scale(1.04); }
.mc-thumb-label {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--text2); font-family: var(--font-main);
  background: rgba(6,12,20,.8); padding: 2px 10px; border-radius: 10px;
}
.mc-thumb-num {
  position: absolute; top: 8px; right: 10px;
  font-size: 18px; font-weight: 800; color: var(--border);
  font-family: var(--font-ui);
}
.mc-thumb.active .mc-thumb-num { color: var(--accent); }
.mc-ws-preview {
  position: absolute; inset: 0;
  background: var(--bg-desktop);
  overflow: hidden;
}
.mc-mini-bar {
  position: absolute; bottom: 0; width: 100%; height: 14px;
  background: var(--bg-glass); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 6px; gap: 4px;
}
.mc-mini-dot { width: 20px; height: 4px; background: var(--border); border-radius: 2px; }
.mc-mini-dot.a { background: var(--accent); width: 26px; }
#mc-hint { color: var(--tex3,var(--text3)); font-size: 10px; font-family: var(--font-main); margin-top: 12px; }


@keyframes bload {
  from { opacity:.4; transform:scaleX(.3); transform-origin:left; }
  to   { opacity:1;  transform:scaleX(1);  transform-origin:left; }
}

/* ── LuoOS IDE (Monaco) styles ─────────────────────────────────── */
.luovs-menu-item {
  padding: 0 8px; height: 30px; display: flex; align-items: center;
  font-size: 12px; color: #ccc; cursor: pointer; transition: background .12s;

}
.luovs-menu-item:hover { background: #555; }

}
.luovs-actbtn:hover { color: #ccc; }
.luovs-act-active { color: #fff !important; border-left-color: #4fc3f7 !important; }
</style>

const API = "http://localhost:3000";

  // LUOKAI model status — shown in taskbar automatically
  async function updateModelStatus() {
    try {
      const r = await fetch(`${API}/api/model/status`);
      const d = await r.json();
      const el = document.getElementById("luokai-model-status");
      if (!el) return;
      if (d.ready) {
        el.textContent = "🟢 LUOKAI ready";
        el.title = d.model || "";
        el.style.color = "var(--accent, #4f9)";
        clearInterval(window._modelPoll);
      } else if (d.loading) {
        el.textContent = "⏳ Loading AI weights...";
        el.title = "First run: downloading ~900MB once";
        el.style.color = "#fa0";
      } else {
        el.textContent = "⚡ LUOKAI starting";
        el.style.color = "var(--text2, #aaa)";
      }
    } catch(e) { /* server starting */ }
  }
  window._modelPoll = setInterval(updateModelStatus, 3000);
  setTimeout(updateModelStatus, 800);

// ── INIT ─────────────────────────────────────────────────────────
function init() {
  boot();
  renderDesktop();
  updateClock();
  setInterval(updateClock, 1000);
  checkAgent();
  setInterval(checkAgent, 8000);
}

// ── BOOT SEQUENCE ─────────────────────────────────────────────────
function boot() {
  const steps = [
    "Initializing Luo kernel...",
    "Loading hardware drivers...",
    "Starting LUOKAI AI core...",
    "Mounting virtual filesystem...",
    "Loading 4,146 skills...",
    "Starting voice daemon...",
    "Starting co-evolution engine...",
    "Launching desktop environment...",
    "LuoOS ready.",
  ];
  let i = 0;
  const bar = document.getElementById("boot-bar");
  const status = document.getElementById("boot-status");
  const iv = setInterval(() => {
    if (i >= steps.length) {
      clearInterval(iv);
      const bs = document.getElementById("boot-screen");
      bs.style.transition = "opacity .5s";
      bs.style.opacity = "0";
      setTimeout(() => bs.remove(), 500);
      notify("LuoOS Ready", "LUOKAI AI is online. Say 'Luo' to begin.", "success");
      return;
    }
    status.textContent = steps[i];
    bar.style.width = ((i + 1) / steps.length * 100) + "%";
    i++;
  }, 250);
}

// ── DESKTOP ───────────────────────────────────────────────────────
function renderDesktop() {
  const d = document.getElementById("desktop");
  d.innerHTML = APPS.map(app => `
    <div class="desk-icon" ondblclick="openApp('${app.id}')" title="${app.desc}">
      ${app.icon}
      <span>${app.name}</span>
    </div>`).join("");
}

// ── CLOCK ─────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("tb-time").textContent = now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  document.getElementById("tb-date").textContent = now.toLocaleDateString([], {weekday:"short",month:"short",day:"numeric"});
}

// ── AGENT STATUS ─────────────────────────────────────────────────
async function checkAgent() {
  try {
    const r = await fetch(`${API}/api/status`);
    if (r.ok) {
      const d = await r.json();
      agentOnline = true;
      document.getElementById("sb-luokai-status").className = "on";
      document.getElementById("sb-luokai-status").title = `LUOKAI online | Score: ${d.coevo_score || "—"}`;
      if (d.voice_active) {
        document.getElementById("tb-voice-indicator").textContent = "🎤 ON";
        document.getElementById("tb-voice-indicator").style.color = "#00ff9d";
      }
      if (d.coevo_score) {
        document.getElementById("tb-coevo-indicator").textContent = `🔄 ${d.coevo_score.toFixed(1)}`;
        document.getElementById("tb-coevo-indicator").style.color = "#00c8ff";
      }
    }
  } catch (e) {
    agentOnline = false;
    document.getElementById("sb-luokai-status").className = "";
  }
}

// ── WINDOW MANAGER ────────────────────────────────────────────────
function openApp(id) {
  if (windows[id]) {
    // Restore if minimized
    const w = windows[id];
    if (w.classList.contains("minimized")) w.classList.remove("minimized");
    w.style.zIndex = ++wZIndex;
    w.querySelector(".wbtn.close")?.parentElement?.parentElement?.classList.remove("minimized");
    updateTaskbar();
    return;
  }
  const app = APPS.find(a => a.id === id);
  if (!app) return;

  const w = document.createElement("div");
  w.className = `window ${id}-window`;
  w.id = `win-${id}`;
  w.style.cssText = getDefaultPos(id);
  w.style.zIndex = ++wZIndex;

  w.innerHTML = `
    <div class="window-header">
      <div class="window-btns">
        <button class="wbtn close" onclick="closeApp('${id}')"></button>
        <button class="wbtn min" onclick="minimizeApp('${id}')"></button>
        <button class="wbtn max" onclick="maximizeApp('${id}')"></button>
      </div>
      <div class="window-title">${app.icon} <span>${app.name}</span></div>
    </div>
    <div class="window-content">${renderAppContent(id)}</div>`;

  document.getElementById("window-container").appendChild(w);
  windows[id] = w;
  makeDraggable(w);
  makeResizable(w);
  updateTaskbar();

  // Init app
  setTimeout(() => initApp(id), 50);
}

function getDefaultPos(id) {
  const positions = {
    luokai:   "width:420px;height:560px;left:40px;top:40px",
    terminal: "width:680px;height:420px;left:120px;top:80px",
    files:    "width:640px;height:460px;left:160px;top:60px",
    browser:  "width:860px;height:560px;left:80px;top:40px",
    code:     "width:760px;height:520px;left:100px;top:60px",
    vscode:   "width:1000px;height:680px;left:60px;top:30px",
    notes:    "width:480px;height:420px;left:200px;top:100px",
    settings: "width:640px;height:480px;left:120px;top:80px",
    about:    "width:480px;height:420px;left:200px;top:120px",
    studio:   "width:700px;height:500px;left:100px;top:60px",
    vision:   "width:620px;height:480px;left:140px;top:70px",
    music:    "width:480px;height:380px;left:180px;top:100px",
  };
  return positions[id] || "width:600px;height:400px;left:100px;top:80px";
}

function closeApp(id) {
  if (!windows[id]) return;
  windows[id].remove();
  delete windows[id];
  updateTaskbar();
}

function minimizeApp(id) {
  if (!windows[id]) return;
  windows[id].classList.add("minimized");
  updateTaskbar();
}

function maximizeApp(id) {
  if (!windows[id]) return;
  windows[id].classList.toggle("maximized");
}

function updateTaskbar() {
  const tb = document.getElementById("tb-apps");
  tb.innerHTML = Object.entries(windows).map(([id, w]) => {
    const app = APPS.find(a => a.id === id);
    const min = w.classList.contains("minimized");
    return `<button class="tb-app ${min ? "" : "active"}" onclick="${min ? `restoreApp` : `minimizeApp`}('${id}')">
      ${app ? app.name : id}
    </button>`;
  }).join("");
}

function restoreApp(id) {
  if (!windows[id]) return;
  windows[id].classList.remove("minimized");
  windows[id].style.zIndex = ++wZIndex;
  updateTaskbar();
}

// ── APP INIT ──────────────────────────────────────────────────────
function initApp(id) {
  if (id === "terminal") {
    document.getElementById("term-input")?.focus();
  }
  if (id === "luokai") {
    document.getElementById("luokai-input")?.focus();
  }
  if (id === "files") {
    filesLoad("~");
  }
  if (id === "vscode") {
    luovsInit();
  }
  if (id === "settings") {
    // Update live stats
    checkAgent().then(() => {
      document.getElementById("st-mem") && fetch(`${API}/api/status`).then(r=>r.json()).then(d=>{
        const m = document.getElementById("st-mem");
        if (m) m.textContent = `${d.memory || 0} entries`;
        const s = document.getElementById("st-skills");
        if (s) {
          fetch(`${API}/api/skills/stats`).then(r=>r.json()).then(sd=>{
            if(sd.total) s.textContent = `${sd.total.toLocaleString()}`;
          }).catch(()=>{ if(s) s.textContent = `${d.skills || 4146}`; });
        }
      }).catch(()=>{});
    });
  }
}

// ── LUOKAI CHAT ───────────────────────────────────────────────────
function luokaiKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); luokaiSend(); }
}

async function luokaiSend() {
  const input = document.getElementById("luokai-input");
  const msg   = input?.value?.trim();
  if (!msg) return;
  input.value = "";
  input.style.height = "auto";

  addChatMsg("user", msg);

  // Thinking indicator
  const thinkId = "think-" + Date.now();
  addChatMsg("ai", "...", thinkId);

  try {
    const r = await fetch(`${API}/api/chat`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: msg}),
    });
    const d = await r.json();
    document.getElementById(thinkId)?.remove();
    addChatMsg("ai", d.response || d.error || "No response");
  } catch(e) {
    document.getElementById(thinkId)?.remove();
    // Server not reachable — retry once after 800ms (handles cold start)
    await new Promise(r => setTimeout(r, 800));
    try {
      const r2 = await fetch(`${API}/api/chat`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg}),
      });
      const d2 = await r2.json();
      addChatMsg("ai", d2.response || d2.error || "No response");
    } catch(e2) {
      addChatMsg("ai", "LUOKAI is starting up — please wait a moment and try again.");
    }
  }
}

function addChatMsg(role, text, id) {
  const chat = document.getElementById("luokai-chat");
  if (!chat) return;
  const div = document.createElement("div");
  div.className = `chat-msg ${role}`;
  if (id) div.id = id;
  const formatted = text
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+)`/g, `<code style="background:var(--bg-card);padding:1px 5px;border-radius:4px">$1</code>`)
    .replace(/\n/g, "<br>");
  div.innerHTML = `<div class="chat-avatar">${role==="ai"?"🤖":"👤"}</div><div><div class="chat-bubble">${formatted}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ── VOICE ─────────────────────────────────────────────────────────
async function toggleVoice() {
  const btn = document.getElementById("luokai-voice-btn");
  if (!voiceActive) {
    try {
      const r = await fetch(`${API}/api/voice/start`, {method:"POST"});
      const d = await r.json();
      if (d.ok) {
        voiceActive = true;
        btn?.classList.add("active");
        document.getElementById("tb-voice-indicator").textContent = "🎤 ON";
        document.getElementById("tb-voice-indicator").style.color = "#00ff9d";
        notify("Voice Active", "Say 'Luo' to wake LUOKAI anytime", "success");
        addChatMsg("ai", "👂 Always-on voice activated! Say **'Luo'** or **'LUOKAI'** anywhere and I'll respond.");
      }
    } catch(e) {
      notify("Voice Error", "LUOKAI is starting", "error");
    }
  } else {
    await fetch(`${API}/api/voice/stop`, {method:"POST"}).catch(()=>{});
    voiceActive = false;
    btn?.classList.remove("active");
    document.getElementById("tb-voice-indicator").textContent = "🎤 OFF";
    document.getElementById("tb-voice-indicator").style.color = "#555";
    addChatMsg("ai", "🔇 Voice deactivated.");
  }
}

async function toggleVoiceFromSettings() {
  await toggleVoice();
  const tog = document.getElementById("tog-voice");
  if (tog) tog.className = voiceActive ? "toggle on" : "toggle";
}

async function toggleCoevo() {
  try {
    const r = await fetch(`${API}/api/evolution/start`, {method:"POST"});
    const d = await r.json();
    if (d.ok) {
      notify("Evolution Started", "LUOKAI will now continuously improve itself", "info");
      const tog = document.getElementById("tog-coevo");
      if (tog) tog.className = "toggle on";
    }
  } catch(e) {
    notify("Error", "LUOKAI is starting", "error");
  }
}

let termCwd = "~";

async function termRun(cmd) {
  if (!cmd.trim()) return "";
  termHistory.unshift(cmd);
  termHistIdx = -1;
  const [c, ...args] = cmd.trim().split(/\s+/);

  // Built-in
  if (TERM_CMDS[c]) {
    const r = TERM_CMDS[c](args);
    return r === "CLEAR" ? null : r;
  }

  // luo commands
  if (c === "luo") {
    const sub = args[0]?.toLowerCase();
    if (!sub) return "Usage: luo [query]";
    if (sub === "apps")   return APPS.map(a=>a.name).join("\n");
    if (sub === "open")   { openApp(args[1]||"luokai"); return `Opening ${args[1]}...`; }
    if (sub === "status") {
      try { const r=await fetch(`${API}/api/status`); const d=await r.json(); return JSON.stringify(d,null,2); }
      catch { return "LUOKAI is starting up..."; }
    }
    if (sub === "voice")  { await toggleVoice(); return `Voice ${voiceActive?"on":"off"}`; }
    if (sub === "evolve") { await toggleCoevo(); return "Evolution engine started"; }
    if (sub === "skills") {
      fetch(`${API}/api/skills`).then(r=>r.json()).then(d=>{
        if(d.ok && d.domains){
          const total = Object.values(d.domains).reduce((a,b)=>a+b.count,0);
          let out = `${total.toLocaleString()} skills across ${Object.keys(d.domains).length} domains\n\n`;
          Object.entries(d.domains).forEach(([k,v])=>{
            out += `  ${v.label.padEnd(36)} ${String(v.count).padStart(4)} skills\n`;
          });
          termPrint(out, "term-info");
        }
      }).catch(()=>termPrint("4,146 skills loaded across 20 domains"));
      return "";
    }
    // Ask LUOKAI
    const query = args.join(" ");
    try {
      const r = await fetch(`${API}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:query})});
      const d = await r.json();
      return d.response || "No response";
    } catch { return "LUOKAI is initializing..."; }
  }

  // ls
  if (c === "ls") {
    try {
      const r = await fetch(`${API}/api/fs/ls`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:args[0]||termCwd})});
      const d = await r.json();
      if (d.ok) return d.items.map(i=>`${i.type==="dir"?"\x1b[34m":"\x1b[0m"}${i.name}`).join("  ") || "(empty)";
    } catch {}
    return `luo@luoos:${termCwd}$ (offline - cannot list filesystem)`;
  }

  // cd
  if (c === "cd") { termCwd = args[0] || "~"; return `Changed to: ${termCwd}`; }

  // cat
  if (c === "cat") {
    try {
      const r = await fetch(`${API}/api/fs/read`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:args[0]})});
      const d = await r.json();
      if (d.ok) return d.content;
      return d.error;
    } catch { return "Cannot read file (server offline)"; }
  }

  // python
  if (c === "python" || c === "python3") {
    const code = args.slice(args.indexOf("-c")+1).join(" ").replace(/^"|"$/g,"");
    if (code) {
      try {
        const r = await fetch(`${API}/api/execute`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code,language:"python"})});
        const d = await r.json();
        return d.output;
      } catch { return "Python execution unavailable"; }
    }
    return "Interactive Python: luo run python";
  }

  // Fallback — send to LUOKAI AI
  try {
    const r = await fetch(`${API}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:`terminal command: ${cmd}`})});
    const d = await r.json();
    return d.response || `Command not found: ${c}`;
  } catch {
    return `Command not found: ${c}\nType 'help' for available commands`;
  }
}

function termPrint(text, cls="") {
  const out = document.getElementById("term-output");
  if (!out) return;
  const div = document.createElement("div");
  div.className = `term-output ${cls}`;
  div.innerHTML = escHtml(text || "").replace(/\n/g,"<br>");
  out.appendChild(div);
  const body = document.getElementById("term-body");
  if (body) body.scrollTop = body.scrollHeight;
}

async function termKey(e) {
  const input = e.target;
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    input.value = "";
    const prompt = `luo@luoos:${termCwd}$ ${cmd}`;
    termPrint(prompt, "term-info");
    if (cmd) {
      const result = await termRun(cmd);
      if (result === null) {
        document.getElementById("term-output").innerHTML = "";
      } else if (result !== undefined) {
        termPrint(result);
      }
    }
  } else if (e.key === "ArrowUp") {
    termHistIdx = Math.min(termHistIdx+1, termHistory.length-1);
    input.value = termHistory[termHistIdx] || "";
  } else if (e.key === "ArrowDown") {
    termHistIdx = Math.max(termHistIdx-1, -1);
    input.value = termHistory[termHistIdx] || "";
  }
}

let filesCwd = "~", filesStack = [];

async function filesLoad(path) {
  path = path || filesCwd;
  const pathEl = document.getElementById("files-path");
  const grid   = document.getElementById("files-grid");
  if (pathEl) pathEl.value = path;
  if (grid) grid.innerHTML = `<div style="color:var(--text3);font-size:12px;padding:20px">Loading...</div>`;

  try {
    const r = await fetch(`${API}/api/fs/ls`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})});
    const d = await r.json();
    if (d.ok) {
      filesCwd = d.path;
      if (pathEl) pathEl.value = filesCwd;
      if (grid) grid.innerHTML = d.items.map(i=>`
        <div class="file-item" ondblclick="filesOpen('${d.path}/${i.name}','${i.type}')">
          <div class="file-item-icon">${i.type==="dir"?"📁":getFileIcon(i.name)}</div>
          <div class="file-item-name">${i.name}</div>
        </div>`).join("") || `<div style="color:var(--text3);padding:20px;font-size:12px">(empty)</div>`;
    }
  } catch {
    if (grid) grid.innerHTML = `<div style="color:var(--text3);padding:20px;font-size:12px">Loading...</div>`;
  }
}

function getFileIcon(name) {
  const ext = name.split(".").pop()?.toLowerCase();
  const icons = {py:"🐍",js:"📜",html:"🌐",css:"🎨",json:"📋",md:"📝",txt:"📄",png:"🖼️",jpg:"🖼️",gif:"🎞️",mp4:"🎬",mp3:"🎵",pdf:"📕",zip:"📦",sh:"⚙️"};
  return icons[ext] || "📄";
}

function filesOpen(path, type) {
  if (type === "dir") {
    filesStack.push(filesCwd);
    filesLoad(path);
  } else {
    openApp("code");
    setTimeout(async()=>{
      try {
        const r = await fetch(`${API}/api/fs/read`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})});
        const d = await r.json();
        const ed = document.getElementById("code-editor");
        if (d.ok && ed) ed.value = d.content;
      } catch {}
    }, 200);
  }
}

function filesNav(dir) {
  if (dir === -1 && filesStack.length) filesLoad(filesStack.pop());
}

function filesUp() {
  const up = filesCwd.split("/").slice(0,-1).join("/") || "/";
  filesStack.push(filesCwd);
  filesLoad(up);
}

// ── LUO BROWSER — server-side proxy ──────────────────────────────
const _bHistory = [], _bHistoryPos = [-1];  // [-1] = boxed int

function _bShowLoading(on) {
  const el = document.getElementById("browser-loading");
  if (el) el.style.display = on ? "block" : "none";
}

function _bShowPage(html, url, title) {
  const homepage = document.getElementById("browser-homepage");
  const wrap     = document.getElementById("browser-frame-wrap");
  const page     = document.getElementById("browser-page");
  const errEl    = document.getElementById("browser-error");
  const urlInput = document.getElementById("browser-url");
  if (homepage) homepage.style.display = "none";
  if (errEl)    errEl.style.display = "none";
  if (wrap)     wrap.style.display = "block";
  if (page)     page.innerHTML = html;
  if (urlInput) urlInput.value = url;
  // Intercept links inside the rendered page
  if (page) {
    page.querySelectorAll("a[href]").forEach(a => {
      a.addEventListener("click", e => {
        e.preventDefault();
        const href = a.getAttribute("href");
        if (href && !href.startsWith("#") && !href.startsWith("javascript:")) {
          browserLoad(href);
        }
      });
    });
    page.querySelectorAll("form").forEach(form => {
      form.addEventListener("submit", e => {
        e.preventDefault();
        const input = form.querySelector("input[type=text],input[type=search],input:not([type])");
        if (input && input.value) browserSearch(input.value);
      });
    });
  }
  // Update history
  _bHistory.push({url, title});
  _bHistoryPos[0] = _bHistory.length - 1;
}

function _bShowError(msg, url) {
  const homepage = document.getElementById("browser-homepage");
  const wrap     = document.getElementById("browser-frame-wrap");
  const errEl    = document.getElementById("browser-error");
  const errMsg   = document.getElementById("browser-error-msg");
  if (homepage) homepage.style.display = "none";
  if (wrap)     wrap.style.display = "none";
  if (errEl)    errEl.style.display = "flex";
  if (errMsg)   errMsg.textContent = `Could not load: ${url}\n\nError: ${msg}`;
}

async function browserLoad(url) {
  if (!url) return;
  if (!url.startsWith("http")) url = "https://" + url;
  const urlInput = document.getElementById("browser-url");
  if (urlInput) urlInput.value = url;
  _bShowLoading(true);
  try {
    const r = await fetch(API + "/api/browser/fetch", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({url})
    });
    const d = await r.json();
    _bShowLoading(false);
    if (d.ok) {
      _bShowPage(d.html, d.url, d.title);
    } else {
      _bShowError(d.error || "Unknown error", url);
    }
  } catch(e) {
    _bShowLoading(false);
    _bShowError(e.message, url);
  }
}

async function browserSearch(query) {
  const r = await fetch(API + "/api/browser/search", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({query})
  });
  const d = await r.json();
  if (d.ok && d.redirect) await browserLoad(d.redirect);
  else if (d.ok && d.search_url) await browserLoad(d.search_url);
}

function browserGo() {
  const urlInput = document.getElementById("browser-url");
  let val = (urlInput?.value || "").trim();
  if (!val) return;
  // If it looks like a URL, load it; else search
  if (val.includes(".") && !val.includes(" ")) {
    browserLoad(val);
  } else {
    browserSearch(val);
  }
}

function browserBack() {
  const pos = _bHistoryPos[0];
  if (pos > 0) {
    _bHistoryPos[0] = pos - 1;
    browserLoad(_bHistory[pos - 1].url);
  }
}

function browserFwd() {
  const pos = _bHistoryPos[0];
  if (pos < _bHistory.length - 1) {
    _bHistoryPos[0] = pos + 1;
    browserLoad(_bHistory[pos + 1].url);
  }
}

function browserReload() {
  const pos = _bHistoryPos[0];
  if (pos >= 0) browserLoad(_bHistory[pos].url);
}

function browserHome() {
  const homepage = document.getElementById("browser-homepage");
  const wrap     = document.getElementById("browser-frame-wrap");
  const errEl    = document.getElementById("browser-error");
  if (homepage) homepage.style.display = "flex";
  if (wrap)     wrap.style.display = "none";
  if (errEl)    errEl.style.display = "none";
  const urlInput = document.getElementById("browser-url");
  if (urlInput) urlInput.value = "";
}

// Legacy alias (called from old code)
function browserNav(action) {
  if (action === "back")   browserBack();
  if (action === "fwd")    browserFwd();
  if (action === "reload") browserReload();
}

// ── DRAGGABLE WINDOWS ─────────────────────────────────────────────
function makeDraggable(win) {
  const hdr = win.querySelector(".window-header");
  let dx=0, dy=0, x1=0, y1=0;
  hdr.onmousedown = e => {
    if (e.target.classList.contains("wbtn")) return;
    win.style.zIndex = ++wZIndex;
    x1=e.clientX; y1=e.clientY;
    document.onmousemove = mv => {
      dx=x1-mv.clientX; dy=y1-mv.clientY; x1=mv.clientX; y1=mv.clientY;
      const newTop  = Math.max(0, win.offsetTop-dy);
      const newLeft = Math.max(0, win.offsetLeft-dx);
      win.style.top  = newTop+"px";
      win.style.left = newLeft+"px";
    };
    document.onmouseup = () => { document.onmousemove=null; document.onmouseup=null; };
  };
}

function makeResizable(win) {
  const handle = document.createElement("div");
  handle.style.cssText="position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:se-resize;z-index:10";
  win.appendChild(handle);
  let startX,startY,startW,startH;
  handle.onmousedown = e => {
    startX=e.clientX; startY=e.clientY;
    startW=win.offsetWidth; startH=win.offsetHeight;
    document.onmousemove = mv => {
      win.style.width  = Math.max(320,startW+(mv.clientX-startX))+"px";
      win.style.height = Math.max(240,startH+(mv.clientY-startY))+"px";
    };
    document.onmouseup = () => { document.onmousemove=null; document.onmouseup=null; };
  };
}

function notify(title, body, type="info") {
  const c = document.getElementById("notif-container");

  const n = document.createElement("div");

  n.innerHTML = `<div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;

// ════════════════════════════════════════════════════════════════
// LUO IDE — Monaco Editor (VS Code engine, runs in browser)
// No code-server, no binary, no install. Works immediately.
// ════════════════════════════════════════════════════════════════

// File system (in-memory, persisted to localStorage)
const luovsFS = {
  files: (()=>{ try { return JSON.parse(localStorage.getItem('luovs-files') || 'null'); } catch(e) { return null; } })() || {
    'main.py':        '# LuoOS Python script\n# Ask LUOKAI to help with your code\n\ndef greet(name):\n    """Return a greeting."""\n    return f"Hello from LuoOS, {name}!"\n\nif __name__ == "__main__":\n    print(greet("World"))\n',
    'index.html':     '<!DOCTYPE html>\n<html>\n<head><title>My App</title></head>\n<body>\n  <h1>Built with LuoOS</h1>\n</body>\n</html>\n',
    'notes.md':       '# Notes\n\n## Ideas\n- Build something cool\n\n## TODO\n- [ ] Task 1\n- [ ] Task 2\n',
    'luokai_test.py': '# Test LUOKAI inference\nimport sys, os\nsys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))\n\ntry:\n    from luokai.core.inference import get_inference\n    eng = get_inference()\n    r = eng.generate([{"role":"user","content":"what is binary search"}])\n    print("LUOKAI:", r[:200])\nexcept Exception as e:\n    print("Error:", e)\n',
  },
  save() { try { localStorage.setItem('luovs-files', JSON.stringify(this.files)); } catch(e) {} }
};

let luovsEditor = null;       // Monaco editor instance
let luovsCurrentFile = 'main.py';
let luovsOpenTabs = ['main.py'];
let luovsMonacoReady = false;
let luovsTermHistory = [];
let luovsTermHistIdx = -1;

// Language map
const luovsLangMap = {
  py:'python', js:'javascript', ts:'typescript', html:'html',
  css:'css', json:'json', md:'markdown', sh:'shell',
  txt:'plaintext', yaml:'yaml', yml:'yaml', xml:'xml',
  cpp:'cpp', c:'c', rs:'rust', go:'go', java:'java',
};

function luovsGetLang(fname) {
  const ext = fname.split('.').pop().toLowerCase();
  return luovsLangMap[ext] || 'plaintext';
}

// ── Init Monaco (loads from CDN once, then cached) ────────────────
function luovsInit() {
  // Ensure Monaco is loaded
  if (!window.monaco) {
    luovsLoadMonaco();
  } else {
    luovsBootEditor();
  }
  luovsRefreshSidebar();
  luovsRefreshTabs();
  luovsPrintTerm('LuoOS IDE ready. Type "help" for commands.\n$ ');
  // Poll model status
  luovsCheckModel();
}

function luovsLoadMonaco() {
  if (document.getElementById('monaco-loader')) {
    // Already loading — wait
    const check = setInterval(() => {
      if (window.monaco) { clearInterval(check); luovsBootEditor(); }
    }, 300);
    return;
  }
  luovsPrintTerm('Loading Monaco editor from CDN...\n');
  const loader = document.createElement('script');
  loader.id  = 'monaco-loader';
  loader.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js';
  loader.onload = () => {
    // AMD require is now available via the loaded script
    window.require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
    window.require(['vs/editor/editor.main'], () => {
      luovsPrintTerm('Monaco loaded.\n$ ');
      luovsBootEditor();
    });
  };
  loader.onerror = () => {
    luovsPrintTerm('CDN unavailable — using textarea fallback.\n$ ');
    luovsBootFallback();
  };
  document.head.appendChild(loader);
}

function luovsBootEditor() {
  const container = document.getElementById('luovs-monaco');
  if (!container || !window.monaco) return;
  container.innerHTML = '';

  luovsEditor = monaco.editor.create(container, {
    value:     luovsFS.files[luovsCurrentFile] || '',
    language:  luovsGetLang(luovsCurrentFile),
    theme:     'vs-dark',
    fontSize:  13,
    fontFamily: "'Consolas','Courier New',monospace",
    minimap:   { enabled: true },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    wordWrap:  'off',
    lineNumbers: 'on',
    renderWhitespace: 'selection',
    quickSuggestions: true,
    suggestOnTriggerCharacters: true,
    tabSize: 2,
  });

  // Save on change
  luovsEditor.onDidChangeModelContent(() => {
    luovsFS.files[luovsCurrentFile] = luovsEditor.getValue();
    luovsFS.save();
    // Update cursor position in status bar
    const pos = luovsEditor.getPosition();
    if (pos) {
      const el = document.getElementById('luovs-pos');
      if (el) el.textContent = `Ln ${pos.lineNumber}, Col ${pos.column}`;
    }
  });

  // Update cursor pos on move
  luovsEditor.onDidChangeCursorPosition(e => {
    const el = document.getElementById('luovs-pos');
    if (el) el.textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
  });

  // Ctrl+S to save
  luovsEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
    luovsSaveFile();
    luovsPrintTerm(`Saved ${luovsCurrentFile}\n$ `);
  });

  // Ctrl+` to focus terminal
  luovsEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Backquote, () => {
    document.getElementById('luovs-term-in')?.focus();
  });

  // F5 to run
  luovsEditor.addCommand(monaco.KeyCode.F5, () => luovsRunFile());

  luovsMonacoReady = true;
  luovsUpdateLangStatus();
}

function luovsBootFallback() {
  // Textarea fallback when CDN unavailable (offline)
  const container = document.getElementById('luovs-monaco');
  if (!container) return;
  container.innerHTML = `
    <textarea id="luovs-fallback-ta" spellcheck="false"
      style="width:100%;height:100%;background:#1e1e1e;color:#d4d4d4;border:none;outline:none;
             padding:14px;font-family:'Consolas','Courier New',monospace;font-size:13px;
             resize:none;line-height:1.6;tab-size:2"
      oninput="luovsFS.files[luovsCurrentFile]=this.value;luovsFS.save()"
    ></textarea>`;
  const ta = document.getElementById('luovs-fallback-ta');
  if (ta) ta.value = luovsFS.files[luovsCurrentFile] || '';
  luovsPrintTerm('Offline mode — using textarea editor. Monaco needs internet for first load.\n$ ');
}

// ── File operations ────────────────────────────────────────────────
function luovsOpenFile(fname) {
  if (!luovsFS.files[fname] && luovsFS.files[fname] !== '') return;
  luovsCurrentFile = fname;
  if (!luovsOpenTabs.includes(fname)) luovsOpenTabs.push(fname);

  if (luovsMonacoReady && window.monaco) {
    const model = monaco.editor.createModel(
      luovsFS.files[fname], luovsGetLang(fname)
    );
    luovsEditor.setModel(model);
    luovsEditor.onDidChangeModelContent(() => {
      luovsFS.files[fname] = luovsEditor.getValue();
      luovsFS.save();
    });
  } else {
    const ta = document.getElementById('luovs-fallback-ta');
    if (ta) ta.value = luovsFS.files[fname];
  }

  luovsRefreshTabs();
  luovsRefreshSidebar();
  luovsUpdateLangStatus();
}

function luovsSaveFile() {
  if (luovsMonacoReady && luovsEditor) {
    luovsFS.files[luovsCurrentFile] = luovsEditor.getValue();
  }
  luovsFS.save();
}

function luovsNewFile() {
  const name = prompt('File name:', 'untitled.py');
  if (!name) return;
  luovsFS.files[name] = '';
  luovsFS.save();
  luovsOpenFile(name);
  luovsRefreshSidebar();
}

function luovsDeleteFile(fname, e) {
  e.stopPropagation();
  if (!confirm(`Delete ${fname}?`)) return;
  delete luovsFS.files[fname];
  luovsFS.save();
  luovsOpenTabs = luovsOpenTabs.filter(t => t !== fname);
  if (luovsCurrentFile === fname) {
    luovsCurrentFile = luovsOpenTabs[0] || Object.keys(luovsFS.files)[0] || 'main.py';
    if (!luovsFS.files[luovsCurrentFile]) luovsFS.files[luovsCurrentFile] = '';
    luovsOpenFile(luovsCurrentFile);
  }
  luovsRefreshSidebar();
  luovsRefreshTabs();
}

function luovsCloseTab(fname, e) {
  e.stopPropagation();
  luovsOpenTabs = luovsOpenTabs.filter(t => t !== fname);
  if (luovsCurrentFile === fname) {
    luovsCurrentFile = luovsOpenTabs[0] || Object.keys(luovsFS.files)[0] || 'main.py';
    luovsOpenFile(luovsCurrentFile);
  }
  luovsRefreshTabs();
}

  return icons[ext] || '📄';
}

// ── Search ─────────────────────────────────────────────────────────
function luovsSearch(q) {
  const res = document.getElementById('luovs-search-results');
  if (!res || !q) { if(res) res.innerHTML=''; return; }
  const hits = [];
  Object.entries(luovsFS.files).forEach(([fname, code]) => {
    const lines = code.split('\n');
    lines.forEach((line, i) => {
      if (line.toLowerCase().includes(q.toLowerCase())) {
        hits.push({fname, line: i+1, text: line.trim()});
      }
    });
  });
  res.innerHTML = hits.slice(0,20).map(h =>
    `<div onclick="luovsOpenFile('${h.fname}')" style="padding:4px;cursor:pointer;border-bottom:1px solid #3c3c3c"
          onmouseover="this.style.background='#2a2d2e'" onmouseout="this.style.background=''">
      <div style="color:#ccc">${h.fname}:${h.line}</div>
      <div style="color:#858585">${h.text.slice(0,60)}</div>
    </div>`
  ).join('') || '<div style="color:#858585;padding:8px">No results</div>';
}

function luovsSearch(query) {
  if (!query) return;
  const results = [];
  Object.entries(luovsFS.files).forEach(([fname, code]) => {
    const lines = code.split('\n');
    lines.forEach((line, i) => {
      if (line.toLowerCase().includes(query.toLowerCase())) {
        results.push({fname, line: line.trim(), lineNum: i + 1});
      }
    });
  });
  const el = document.getElementById('luovs-search-results');
  if (!el) return;
  if (!results.length) { el.textContent = 'No results'; return; }
  el.innerHTML = results.map(r =>
    `<div onclick="luovsOpenFile('${r.fname}')" style="padding:4px;cursor:pointer;border-radius:3px" onmouseover="this.style.background='#2a2d2e'" onmouseout="this.style.background=''">
      <div style="color:#ccc;font-size:11px">${r.fname}:${r.lineNum}</div>
      <div style="color:#858585;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.line}</div>
    </div>`
  ).join('');
}

function luovsMenu(m) {

    if (choice==='1') luovsNewFile();
    if (choice==='2') { luovsSaveFile(); luovsPrintTerm(`Saved ${luovsCurrentFile}\n$ `); }
    if (choice==='3') {
      const name = prompt('New name:', luovsCurrentFile);
      if (name && name!==luovsCurrentFile) {
        luovsFS.files[name] = luovsFS.files[luovsCurrentFile];
        delete luovsFS.files[luovsCurrentFile];
        luovsFS.save();
        luovsOpenTabs = luovsOpenTabs.map(t => t===luovsCurrentFile ? name : t);
        luovsCurrentFile = name;
        luovsRefreshSidebar(); luovsRefreshTabs();
      }
    }
    if (choice==='4') {
      const a = document.createElement('a');
      a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(luovsFS.files[luovsCurrentFile]||'');
      a.download = luovsCurrentFile;
      a.click();
    }
  }
  if (m==='Run') luovsRunFile();
  if (m==='Terminal') document.getElementById('luovs-term-in')?.focus();
  if (m==='View') {
    const choice = prompt('View:\n1) Toggle Minimap\n2) Toggle Terminal\n3) Toggle Sidebar\n\nEnter number:');
    if (choice==='1' && luovsEditor) luovsEditor.updateOptions({minimap:{enabled:!luovsEditor.getOption(61)?.enabled}});
    if (choice==='2') luovsToggleTerminal();
    if (choice==='3') {
      const sb = document.getElementById('luovs-sidebar');
      if (sb) sb.style.display = sb.style.display==='none' ? 'flex' : 'none';
    }
  }
}

// ── Terminal ───────────────────────────────────────────────────────
function luovsPrintTerm(text) {
  const out = document.getElementById('luovs-term-out');
  if (!out) return;
  out.textContent += text;
  out.scrollTop = out.scrollHeight;
}

function luovsTermFocus() { document.getElementById('luovs-term-in')?.focus(); }

function luovsToggleTerminal() {
  const t = document.getElementById('luovs-terminal');
  if (t) t.style.display = t.style.display==='none' ? 'flex' : 'none';
  if (luovsEditor) luovsEditor.layout();
}

function luovsNewTerminal() { luovsPrintTerm('\n--- New terminal ---\n$ '); }

async function luovsTermRun(cmd) {
  if (!cmd.trim()) { luovsPrintTerm('$ '); return; }
  luovsTermHistory.unshift(cmd);
  luovsTermHistIdx = -1;
  luovsPrintTerm(cmd + '\n');

  const c = cmd.trim().toLowerCase();
  // Built-in commands
  if (c === 'help') {
    luovsPrintTerm('Commands: help  clear  ls  pwd  run  save  files  luokai <question>\n$ ');
    return;
  }
  if (c === 'clear') { document.getElementById('luovs-term-out').textContent = ''; luovsPrintTerm('$ '); return; }
  if (c === 'ls')    { luovsPrintTerm(Object.keys(luovsFS.files).join('  ') + '\n$ '); return; }
  if (c === 'pwd')   { luovsPrintTerm('/home/luoos/project\n$ '); return; }
  if (c === 'save')  { luovsSaveFile(); luovsPrintTerm('Saved.\n$ '); return; }
  if (c === 'run')   { await luovsRunFile(); return; }
  if (c === 'files') { luovsPrintTerm(Object.keys(luovsFS.files).map(f=>`  ${_luovsFileIcon(f)} ${f}`).join('\n') + '\n$ '); return; }
  if (c.startsWith('luokai ')) {
    const q = cmd.slice(7);
    luovsPrintTerm('Asking LUOKAI...\n');
    try {
      const r = await fetch(`${API}/api/chat`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q})});
      const d = await r.json();
      luovsPrintTerm((d.response||'No response') + '\n$ ');
    } catch { luovsPrintTerm('LUOKAI unreachable\n$ '); }
    return;
  }
  // Try to run via server
  try {
    const r = await fetch(`${API}/api/execute`, {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code:`import subprocess,sys\nr=subprocess.run(${JSON.stringify(cmd.split(' '))},capture_output=True,text=True,timeout=15)\nprint(r.stdout)\nif r.stderr:print(r.stderr,file=sys.stderr)`,language:'python'})});
    const d = await r.json();
    luovsPrintTerm((d.output||d.stdout||'') + (d.error||d.stderr||'') + '\n$ ');
  } catch { luovsPrintTerm(`${cmd}: command not found\n$ `); }
}

// Arrow keys for terminal history
document.addEventListener('keydown', e => {
  if (document.activeElement?.id !== 'luovs-term-in') return;
  if (e.key === 'ArrowUp') {
    luovsTermHistIdx = Math.min(luovsTermHistIdx+1, luovsTermHistory.length-1);
    document.getElementById('luovs-term-in').value = luovsTermHistory[luovsTermHistIdx]||'';
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    luovsTermHistIdx = Math.max(luovsTermHistIdx-1, -1);
    document.getElementById('luovs-term-in').value = luovsTermHistIdx<0 ? '' : luovsTermHistory[luovsTermHistIdx];
    e.preventDefault();
  }
});

// ── Run file ───────────────────────────────────────────────────────
async function luovsRunFile() {
  luovsSaveFile();
  const code = luovsFS.files[luovsCurrentFile] || '';
  const lang = luovsGetLang(luovsCurrentFile);
  luovsPrintTerm(`\n▶ Running ${luovsCurrentFile}...\n`);
  const t = document.getElementById('luovs-terminal');
  if (t && t.style.display==='none') t.style.display='flex';
  try {
    const r = await fetch(`${API}/api/execute`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code, language: lang==='python'?'python':'python', filename: luovsCurrentFile})
    });
    const d = await r.json();
    const out = d.output || d.stdout || d.result || '';
    const err = d.error  || d.stderr || '';
    if (out) luovsPrintTerm(out + '\n');
    if (err) luovsPrintTerm('STDERR: ' + err + '\n');
    if (!out && !err) luovsPrintTerm('(no output)\n');
    luovsPrintTerm('$ ');
  } catch(e) {
    luovsPrintTerm(`Error: ${e.message}\n$ `);
  }
}

// ── Ask LUOKAI about current code ─────────────────────────────────

  luovsPrintTerm('\n🤖 LUOKAI analysing...\n');

  if (t && t.style.display==='none') t.style.display='flex';

    const r = await fetch(`${API}/api/chat`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q})});
    const d = await r.json();
    luovsPrintTerm((d.response||'No response') + '\n$ ');
  } catch { luovsPrintTerm('LUOKAI unreachable\n$ '); }
}

// ════════════════════════════════════════════════════════════════
// VIRTUAL WORKSPACE SYSTEM — 4 desktops, cube transition
// Like macOS Spaces / Compiz Cube. Normal mouse on each workspace.
// ════════════════════════════════════════════════════════════════
(function() {
  const TOTAL   = 4;
  const NAMES   = ['Main', 'Work', 'Code', 'Media'];
  const ANGLES  = [0, -90, -180, -270];   // cube face angles
  let   current = 0;
  let   switching = false;

  const cube    = document.getElementById('workspace-cube');
  const root    = document.getElementById('workspace-root');
  const ind     = document.getElementById('ws-indicator');
  const label   = document.getElementById('ws-label');
  const ws0     = document.getElementById('ws-0');

  // ── Position cube faces around a 4-sided carousel ──────────────
  // Face 0 → front (rotateY 0)
  // Face 1 → right (rotateY 90 from face 0)
  // Face 2 → back  (rotateY 180)
  // Face 3 → left  (rotateY 270)
  const vw = window.innerWidth;

  function positionFaces() {
    const vw = window.innerWidth;
    const faces = document.querySelectorAll('.workspace');
    faces.forEach((face, i) => {
      if (i === 0) return; // ws-0 needs no transform (sits at origin)
      face.style.transform = `rotateY(${i * 90}deg) translateZ(${vw/2}px)`;
    });
    // ws-0: translateZ so it sits at cube face
    ws0.style.transform = `translateZ(${vw/2}px)`;
    // Set cube to look at face 0
    cube.style.transform = `translateZ(-${vw/2}px) rotateY(0deg)`;
  }
  positionFaces();
  window.addEventListener('resize', positionFaces);

  // ── Switch to workspace n ───────────────────────────────────────
  window.switchWorkspace = function(n) {
    if (n === current || switching) return;
    if (n < 0) n = TOTAL - 1;
    if (n >= TOTAL) n = 0;

    switching = true;
    const prevWs = document.getElementById(`ws-${current}`);
    const nextWs = document.getElementById(`ws-${n}`);

    // Rotate cube to show face n
    const vw = window.innerWidth;
    const angle = -n * 90;
    cube.style.transform = `translateZ(-${vw/2}px) rotateY(${angle}deg)`;

    // Update which workspace hosts the real sidebar+taskbar input
    // (they're always in ws-0 but we reparent window-container visibility)
    current = n;

    // Show/hide workspace content
    document.querySelectorAll('.workspace').forEach((ws, i) => {
      ws.style.pointerEvents = i === n ? 'auto' : 'none';
      ws.style.zIndex = i === n ? '1' : '0';
    });

    updateIndicator();

    // After transition finishes
    setTimeout(() => { switching = false; }, 580);
    showIndicator();
  };

  window.currentWorkspace = () => current;

  // ── Show indicator briefly on switch ───────────────────────────
  let indTimer;
  function showIndicator() {
    ind.classList.add('show');
    clearTimeout(indTimer);
    indTimer = setTimeout(() => ind.classList.remove('show'), 2500);
  }

  function updateIndicator() {
    // Dots
    document.querySelectorAll('.ws-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
    // Mission Control thumbs
    document.querySelectorAll('.mc-thumb').forEach((t, i) => {
      t.classList.toggle('active', i === current);
    });
    // Label
    if (label) label.textContent = NAMES[current] || `Workspace ${current + 1}`;
    // Taskbar workspace badge
    const badge = document.getElementById('tb-ws-badge');
    if (badge) badge.textContent = `WS ${current + 1}`;
  }

  // ── Open app on a specific workspace ───────────────────────────
  window.wsOpenApp = function(wsIdx, appId) {
    if (wsIdx !== current) switchWorkspace(wsIdx);
    setTimeout(() => openApp(appId), 300);
  };

  // ── Mission Control ─────────────────────────────────────────────
  window.openMC = function() {
    document.getElementById('mission-control').classList.add('open');
  };
  window.closeMC = function() {
    document.getElementById('mission-control').classList.remove('open');
  };

  // ── Keyboard shortcuts ──────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.ctrlKey || e.metaKey) {
      if (e.code === 'ArrowRight') { e.preventDefault(); switchWorkspace(current + 1); }
      if (e.code === 'ArrowLeft')  { e.preventDefault(); switchWorkspace(current - 1); }
      if (e.code === 'Digit1')     { e.preventDefault(); switchWorkspace(0); }
      if (e.code === 'Digit2')     { e.preventDefault(); switchWorkspace(1); }
      if (e.code === 'Digit3')     { e.preventDefault(); switchWorkspace(2); }
      if (e.code === 'Digit4')     { e.preventDefault(); switchWorkspace(3); }
      if (e.code === 'ArrowUp')    { e.preventDefault(); openMC(); }
    }
    if (e.key === 'Escape') closeMC();
  });

  // ── Three-finger swipe on trackpad (touch events) ───────────────
  let touchStartX = 0;
  document.addEventListener('touchstart', e => {
    if (e.touches.length >= 3) touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (e.changedTouches.length >= 3) {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 80) switchWorkspace(dx < 0 ? current + 1 : current - 1);
    }
  }, { passive: true });

  // ── Edge swipe with mouse (drag from screen edge 10px) ──────────
  let edgeDrag = false, edgeStart = 0;
  document.addEventListener('mousedown', e => {
    if (e.clientX < 10) { edgeDrag = true; edgeStart = e.clientX; }
    if (e.clientX > window.innerWidth - 10) { edgeDrag = true; edgeStart = e.clientX; }
  });
  document.addEventListener('mouseup', e => {
    if (!edgeDrag) return;
    edgeDrag = false;
    const dx = e.clientX - edgeStart;
    if (Math.abs(dx) > 60) switchWorkspace(dx < 0 ? current + 1 : current - 1);
  });

  // Init
  updateIndicator();
  // Show indicator on first load briefly
  setTimeout(showIndicator, 1200);
  // Make ws-0 active initially
  document.querySelectorAll('.workspace').forEach((ws, i) => {
    ws.style.pointerEvents = i === 0 ? 'auto' : 'none';
  });
})();
