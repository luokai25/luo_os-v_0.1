<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luo OS App Store</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Courier New', monospace; }
  header { background: #111133; padding: 20px 30px; border-bottom: 2px solid #00ffcc33; }
  header h1 { color: #00ffcc; font-size: 1.8em; }
  header p { color: #aaa; margin-top: 5px; }
  .search-bar { padding: 20px 30px; background: #0d0d22; }
  .search-bar input { width: 100%; max-width: 500px; background: #111133; border: 1px solid #00ffcc44; color: #fff; padding: 12px 20px; border-radius: 25px; font-family: monospace; font-size: 1em; outline: none; }
  .search-bar input:focus { border-color: #00ffcc; }
  .categories { display: flex; gap: 10px; padding: 10px 30px 20px; flex-wrap: wrap; }
  .cat-btn { background: #111133; border: 1px solid #00ffcc33; color: #00ffcc; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-family: monospace; font-size: 0.85em; }
  .cat-btn:hover, .cat-btn.active { background: #00ffcc; color: #0a0a1a; }
  .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 0 30px 30px; }
  .app-card { background: #111133; border: 1px solid #00ffcc22; border-radius: 10px; padding: 20px; transition: border-color 0.2s; }
  .app-card:hover { border-color: #00ffcc66; }
  .app-icon { font-size: 2.5em; margin-bottom: 10px; }
  .app-name { color: #00ffcc; font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
  .app-desc { color: #aaa; font-size: 0.85em; margin-bottom: 12px; line-height: 1.4; }
  .app-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .app-category { background: #00ffcc22; color: #00ffcc; padding: 2px 10px; border-radius: 10px; font-size: 0.75em; }
  .app-price { color: #00ffcc; font-weight: bold; font-size: 0.9em; }
  .install-btn { width: 100%; background: #00ffcc; color: #0a0a1a; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 0.9em; }
  .install-btn:hover { background: #00ddaa; }
  .install-btn.installed { background: #00ffcc22; color: #00ffcc; cursor: default; }
  .stats-bar { display: flex; gap: 30px; padding: 15px 30px; background: #0d0d22; border-bottom: 1px solid #00ffcc11; }
  .stat { text-align: center; }
  .stat-num { color: #00ffcc; font-size: 1.3em; font-weight: bold; }
  .stat-label { color: #aaa; font-size: 0.75em; }
  #install-toast { position: fixed; bottom: 30px; right: 30px; background: #00ffcc; color: #0a0a1a; padding: 12px 24px; border-radius: 8px; font-weight: bold; display: none; }
</style>
</head>
<body>

<header>
  <h1>⚡ Luo OS App Store</h1>
  <p>All apps are free — forever. For humans and AI agents.</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="total-apps">0</div><div class="stat-label">Total Apps</div></div>
  <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Free</div></div>
  <div class="stat"><div class="stat-num" id="installed-count">0</div><div class="stat-label">Installed</div></div>
  <div class="stat"><div class="stat-num">0</div><div class="stat-label">Paid Apps</div></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Search apps..." oninput="renderApps()">
</div>

<div class="categories" id="categories"></div>
<div class="apps-grid" id="apps-grid"></div>
<div id="install-toast">✅ Installing...</div>

<script>
const APPS = [
  { name: "Luo Editor", icon: "📝", desc: "Built-in text editor with syntax support", category: "editor", install: "python3 apps/text_editor.py", builtin: true },
  { name: "Luo Browser", icon: "🌐", desc: "Simple web browser built into Luo OS", category: "browser", install: "python3 apps/browser.py", builtin: true },
  { name: "Luo Files", icon: "📁", desc: "File manager for browsing your system", category: "system", install: "python3 apps/file_manager.py", builtin: true },
  { name: "Luo AI", icon: "🤖", desc: "Talk to your local AI — TinyLlama powered", category: "ai", install: "python3 ai_core/daemon.py", builtin: true },
  { name: "Luo Terminal", icon: "💻", desc: "Luo OS shell environment", category: "system", install: "bash shell/luo_shell.sh", builtin: true },
  { name: "Luo Dashboard", icon: "📊", desc: "Web-based OS control panel", category: "system", install: "open ui/dashboard.html", builtin: true },
  { name: "Agent API", icon: "🔌", desc: "Socket API on port 7070 for AI agents", category: "ai", install: "python3 ai_core/agent_api.py", builtin: true },
  { name: "REST API", icon: "🌍", desc: "HTTP API on port 7071 for web agents", category: "ai", install: "python3 ai_core/rest_api.py", builtin: true },
  { name: "Multi-Agent", icon: "👥", desc: "Spawn and manage multiple AI agents", category: "ai", install: "python3 ai_core/multi_agent.py", builtin: true },
  { name: "Wine Bridge", icon: "🪟", desc: "Run Windows .exe apps on Luo OS", category: "compat", install: "python3 compat/wine_bridge.py", builtin: true },
  { name: "Vim", icon: "⌨️", desc: "Powerful terminal text editor", category: "editor", install: "luo install vim" },
  { name: "Firefox", icon: "🦊", desc: "Full web browser", category: "browser", install: "luo install firefox" },
  { name: "VLC", icon: "🎬", desc: "Media player for video and audio", category: "media", install: "luo install vlc" },
  { name: "TinyLlama", icon: "🦙", desc: "1B parameter local AI model", category: "ai", install: "luo install tinyllama" },
  { name: "Mistral 7B", icon: "🧠", desc: "Powerful 7B local AI model", category: "ai", install: "luo install mistral" },
  { name: "Python", icon: "🐍", desc: "Python programming language + pip", category: "dev", install: "luo install python3" },
  { name: "Rust", icon: "🦀", desc: "Systems programming language", category: "dev", install: "luo install rust" },
  { name: "Node.js", icon: "📦", desc: "JavaScript runtime environment", category: "dev", install: "luo install nodejs" },
  { name: "Docker", icon: "🐳", desc: "Container runtime", category: "dev", install: "luo install docker" },
  { name: "Git", icon: "🌿", desc: "Version control system", category: "dev", install: "luo install git" },
  { name: "htop", icon: "📈", desc: "Interactive system monitor", category: "system", install: "luo install htop" },
  { name: "FFmpeg", icon: "🎥", desc: "Media converter and processor", category: "media", install: "luo install ffmpeg" },
];

const installed = new Set(APPS.filter(a => a.builtin).map(a => a.name));
let activeCategory = "all";

function getCategories() {
  const cats = ["all", ...new Set(APPS.map(a => a.category))];
  return cats;
}

function renderCategories() {
  const el = document.getElementById("categories");
  el.innerHTML = getCategories().map(cat =>
    `<button class="cat-btn ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
  ).join("");
}

function setCategory(cat) {
  activeCategory = cat;
  renderCategories();
  renderApps();
}

function renderApps() {
  const query = document.getElementById("search").value.toLowerCase();
  let apps = APPS;
  if (activeCategory !== "all") apps = apps.filter(a => a.category === activeCategory);
  if (query) apps = apps.filter(a => a.name.toLowerCase().includes(query) || a.desc.toLowerCase().includes(query));

  document.getElementById("apps-grid").innerHTML = apps.map(app => `
    <div class="app-card">
      <div class="app-icon">${app.icon}</div>
      <div class="app-name">${app.name}</div>
      <div class="app-desc">${app.desc}</div>
      <div class="app-meta">
        <span class="app-category">${app.category}</span>
        <span class="app-price">FREE</span>
      </div>
      <button class="install-btn ${installed.has(app.name) ? 'installed' : ''}"
        onclick="installApp('${app.name}', '${app.install}')">
        ${installed.has(app.name) ? '✅ Installed' : '⬇️ Install'}
      </button>
    </div>
  `).join("");

  document.getElementById("total-apps").textContent = APPS.length;
  document.getElementById("installed-count").textContent = installed.size;
}

function installApp(name, cmd) {
  if (installed.has(name)) return;
  installed.add(name);
  const toast = document.getElementById("install-toast");
  toast.textContent = `✅ Installing ${name}...`;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 2500);
  renderApps();
  console.log(`Install command: ${cmd}`);
}

renderCategories();
renderApps();
</script>
</body>
</html>
